# C:\nexora\infra\docker\docker-compose.yml
# 本機 PostgreSQL（nexora_core）— NEXORA 預設開發資料庫。
# 啟動：於 repo 根目錄執行  docker compose -f infra/docker/docker-compose.yml up -d
# 連線字串見 packages/db-core/.env.example（埠 5433 → 容器 5432）。

services:
  postgres:
    image: postgres:16
    container_name: nexora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexora
      POSTGRES_PASSWORD: nexora123
      POSTGRES_DB: nexora_core
    ports:
      # 公司電腦常有本機 PostgreSQL 佔用 5432，改用 5433 避免衝突
      - "5433:5432"
    volumes:
      - nexora_pgdata:/var/lib/postgresql/data

volumes:
  nexora_pgdata:
